<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investa - Deposit Funds</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;       /* Royal Blue */
            --primary-hover: #1d4ed8;
            --accent: #0d9488;        /* Dark Teal */
            --text-dark: #0f172a;     /* Slate Dark */
            --text-muted: #64748b;    /* Slate Muted */
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --error-red: #ef4444;
            --status-orange: #f59e0b;
            --safaricom-green: #10b981;
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .deposit-container {
            width: 100%;
            max-width: 440px;
        }

        .deposit-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .deposit-title {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 24px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        .hint-msg {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-top: 5px;
        }

        /* Buttons */
        .btn-deposit {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            margin-top: 6px;
        }

        .btn-deposit:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn-deposit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #cbd5e1;
            color: #64748b;
        }

        .btn-back {
            width: 100%;
            background-color: var(--text-dark);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.9;
        }

        /* Deposit History Section */
        .history-section {
            margin-top: 28px;
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .empty-history {
            font-size: 0.88rem;
            color: var(--text-muted);
            text-align: center;
            padding: 12px 0;
        }

        /* Processing Window / Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #ffffff;
            padding: 28px 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .status-text {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .sub-status {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="deposit-container">
        <div class="deposit-card">
            <h1 class="deposit-title">Deposit Funds</h1>

            <form id="depositForm" onsubmit="return false;">
                <!-- Phone Number Field -->
                <div class="form-group">
                    <label class="form-label" for="phone_num">M-Pesa Phone Number</label>
                    <input type="tel" id="phone_num" class="form-input" placeholder="07XXXXXXXX or 01XXXXXXXX" maxlength="10">
                    <div id="phone-error" class="error-msg">Invalid format</div>
                    <div id="inputHint" class="hint-msg">Accepted format: 07... or 01...</div>
                </div>

                <!-- Amount Field -->
                <div class="form-group">
                    <label class="form-label" for="amount">Deposit Amount (Min KES 200)</label>
                    <input type="number" id="amount" class="form-input" placeholder="Enter amount" min="200">
                    <div id="amount-error" class="error-msg">Minimum deposit amount is KES 200</div>
                </div>

                <!-- Action Buttons -->
                <button type="button" id="pay-btn" class="btn-deposit" disabled>Deposit Now</button>
                <a href="dashboard.html" class="btn-back">Back To Dashboard</a>
            </form>

            <!-- Deposit History Section -->
            <div class="history-section">
                <h3 class="history-title">Deposit History</h3>
                <div class="empty-history">No deposit history found.</div>
            </div>
        </div>
    </div>

    <!-- Processing Modal -->
    <div id="processing-window" class="modal-overlay">
        <div class="modal-card">
            <div class="spinner"></div>
            <div id="status-text" class="status-text">SENDING STK PUSH...</div>
            <div id="sub-status" class="sub-status">Please check your phone and enter M-Pesa PIN</div>
        </div>
    </div>

    <script>
        // Check Session Authentication
        const currentSession = JSON.parse(localStorage.getItem('investa_session'));
        if (!currentSession) {
            window.location.href = 'login.html';
        }

        // Elements
        const phoneInput = document.getElementById('phone_num');
        const amountInput = document.getElementById('amount');
        const payBtn = document.getElementById('pay-btn');
        const phoneError = document.getElementById('phone-error');
        const amountError = document.getElementById('amount-error');
        const inputHint = document.getElementById('inputHint');
        const modal = document.getElementById('processing-window');
        const statusText = document.getElementById('status-text');
        const subStatusText = document.getElementById('sub-status');

        // Form Validation Routine
        function validateForm() {
            let rawPhone = phoneInput.value.trim();
            let amountVal = Number(amountInput.value);

            // Phone Validation
            let testPhone = rawPhone;
            if (!rawPhone.startsWith('0') && (rawPhone.startsWith('7') || rawPhone.startsWith('1'))) {
                testPhone = '0' + rawPhone;
            }

            const isPhoneValid = /^(07|01)\d{8}$/.test(testPhone);

            // Real-time error handling for phone
            if (rawPhone.length > 0) {
                if (!isPhoneValid) {
                    phoneError.style.display = "block";
                    inputHint.style.display = "none";
                } else {
                    phoneError.style.display = "none";
                    inputHint.style.display = "block";
                }
            } else {
                phoneError.style.display = "none";
                inputHint.style.display = "block";
            }

            // Amount Validation
            const isAmountValid = amountVal >= 200;
            if (amountInput.value.length > 0 && !isAmountValid) {
                amountError.style.display = "block";
            } else {
                amountError.style.display = "none";
            }

            // Activate button strictly when both phone and amount are valid
            if (isPhoneValid && isAmountValid) {
                payBtn.disabled = false;
            } else {
                payBtn.disabled = true;
            }
        }

        // Attach Real-time Listeners
        phoneInput.addEventListener('input', validateForm);
        amountInput.addEventListener('input', validateForm);

        // STK Push Execution
        payBtn.addEventListener('click', async () => {
            const depositAmount = Number(amountInput.value);

            modal.style.display = "flex";
            statusText.innerText = "SENDING STK PUSH...";
            statusText.style.color = "var(--status-orange)";
            subStatusText.style.display = "block";
            
            let formattedNumber = phoneInput.value.trim();
            if (formattedNumber.startsWith('0')) {
                formattedNumber = '254' + formattedNumber.substring(1);
            } else if (formattedNumber.startsWith('7') || formattedNumber.startsWith('1')) {
                formattedNumber = '254' + formattedNumber;
            }

            const payload = {
                phone: formattedNumber,
                amount: depositAmount
            };

            try {
                const response = await fetch('https://server207k.onrender.com/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success === true) {
                    
                    // CASE 1: Synchronous Completed Response
                    if (data.status === "completed") {
                        statusText.innerText = "PAYMENT VERIFIED SUCCESSFULLY!";
                        statusText.style.color = "var(--safaricom-green)";
                        subStatusText.style.display = "none";
                        setTimeout(() => { 
                            window.location.href = "dashboard.html"; 
                        }, 2000);
                    } 
                    
                    // CASE 2: Asynchronous Pending Response (Standard M-Pesa Prompt)
                    else if (data.status === "pending") {
                        const checkoutId = data.checkout_request_id;
                        
                        if (!checkoutId) {
                            throw new Error("Missing transaction tracking reference from gateway.");
                        }
                        
                        localStorage.setItem("request_id", checkoutId);
                        localStorage.setItem("pending_deposit_amount", depositAmount);
                        
                        statusText.innerText = "PROMPT SENT! REDIRECTING...";
                        statusText.style.color = "var(--safaricom-green)";
                        subStatusText.innerText = "Preparing secure tracking window...";

                        setTimeout(() => { 
                            window.location.href = "processing.html"; 
                        }, 1500);
                    }

                } else {
                    throw new Error(data.message || "Invalid response structure from backend gateway.");
                }
            } catch (error) {
                statusText.innerText = "ERROR: " + error.message;
                statusText.style.color = "var(--error-red)";
                subStatusText.style.display = "none";
                
                setTimeout(() => { 
                    modal.style.display = "none"; 
                }, 3000);
            }
        });
    </script>
</body>
</html>
